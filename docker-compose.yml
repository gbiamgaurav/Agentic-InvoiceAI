services:
  # MongoDB Service
  mongodb:
    image: mongo:7.0
    container_name: invoice-ai-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: invoiceai
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - invoice-ai-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoice-ai-app
    ports:
      - "3000:3000"
    environment:
      # MongoDB connection string
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/invoiceai?authSource=admin
      
      # CORS configuration (allow all origins for development)
      CORS_ORIGINS: "*"
      
      # Next.js specific
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      
      # Add any other environment variables your app needs here
      # API_KEY: your_api_key_here
      # OPENAI_API_KEY: your_openai_key_here
    
    depends_on:
      mongodb:
        condition: service_healthy
    
    networks:
      - invoice-ai-network
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  invoice-ai-network:
    driver: bridge
