services:

  # ── Database ─────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: invoice-ai-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: invoiceai
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - invoice-ai-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invoice-ai-backend
    ports:
      - "8000:8000"
    environment:
      # Database
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/invoiceai?authSource=admin
      MONGODB_DB: invoiceai

      # AI
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}

      # Azure (optional — leave blank to use local stubs)
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
      AZURE_SERVICE_BUS_CONNECTION_STRING: ${AZURE_SERVICE_BUS_CONNECTION_STRING:-}
      APPLICATIONINSIGHTS_CONNECTION_STRING: ${APPLICATIONINSIGHTS_CONNECTION_STRING:-}

      # SAP Concur (optional)
      CONCUR_CLIENT_ID: ${CONCUR_CLIENT_ID:-}
      CONCUR_CLIENT_SECRET: ${CONCUR_CLIENT_SECRET:-}

      # App
      DEBUG: "true"
      LOG_LEVEL: INFO
      CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - invoice-ai-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      # Hot-reload in dev: mount source code
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: invoice-ai-frontend
    ports:
      - "3000:3000"
    environment:
      # Points the browser + server-side fetch at the backend service
      NEXT_PUBLIC_API_URL: http://localhost:8000
      BACKEND_API_URL: http://backend:8000

      # Claude chatbot (used directly by the Next.js /api/chat route)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - invoice-ai-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => { if (r.statusCode !== 200) throw new Error(r.statusCode) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  invoice-ai-network:
    driver: bridge
